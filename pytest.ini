[pytest]
# integration_test.py is intentionally kept (matches *_test.py); tests are an
# ordered E2E pipeline and run in file-definition order.
python_files = test_*.py *_test.py
testpaths = tests
# pytest-asyncio: async test funcs are collected without an explicit marker.
asyncio_mode = auto
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
